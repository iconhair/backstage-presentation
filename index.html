<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Icon Backstage</title>
  <link rel="icon" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663222833884/CWGyVsBcYSzTVuzr.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --espresso: #362a23;
      --cream: #f4f2f2;
      --gold: #a1968f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--espresso);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ─── PASSWORD GATE ─── */
    #password-gate {
      position: fixed;
      inset: 0;
      background: var(--espresso);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 22vh;
      z-index: 1000;
      flex-direction: column;
    }

    #password-gate.hidden { display: none; }

    .gate-center-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .gate-logo {
      width: 360px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gate-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 280px;
    }

    .gate-input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: var(--cream);
      font-size: 16px;
      text-align: center;
      outline: none;
      letter-spacing: 2px;
    }

    .gate-input::placeholder { color: rgba(244,242,242,0.4); letter-spacing: 0; }
    .gate-input:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.1); }

    .gate-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--cream);
      color: var(--espresso);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s;
    }

    .gate-btn:active { opacity: 0.85; transform: scale(0.98); }

    .gate-error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    /* ─── MAIN PRESENTATION ─── */
    #presentation {
      display: none;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      align-items: center;
      justify-content: center;
    }

    #presentation.visible { display: flex; }

    /* ─── DESKTOP: iPhone mockup layout ─── */
    .desktop-view {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      width: 100%;
      padding: 20px;
    }

    /* Brand info sidebar */
    .brand-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 260px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      overflow: hidden;
    }

    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: fit-content;
    }

    .brand-name {
      color: var(--cream);
      font-size: 34px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .brand-name span { color: #d6c9a0; }

    .brand-desc {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ─── iPhone 15 Pro mockup ─── */
    /*
      iPhone 15 Pro native: 393 × 852 pt
      We render the iframe at exactly 393 × 852 px (1:1 with native points)
      Then scale the whole phone down to fit the screen.

      Scale factor s = desired_frame_width / 393
      Frame height   = 852 × s  (no clipping needed)

      Default: desired_frame_width = 300px
        s = 300/393 ≈ 0.7634
        frame_height = 852 × 0.7634 ≈ 650px
    */
    .phone-shell {
      --s: 0.7634;                        /* scale factor */
      --fw: 300px;                        /* frame width  = 393 × s */
      --fh: 650px;                        /* frame height = 852 × s */
      --br: 47px;                         /* border-radius (scaled from 62px) */

      position: relative;
      width: var(--fw);
      height: var(--fh);
      border-radius: var(--br);
      background: #1c1c1e;
      box-shadow:
        0 0 0 1.5px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 4.5px #48484a,
        0 32px 72px rgba(0,0,0,0.7),
        inset 0 0 0 0.5px rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    /* Volume buttons (left) */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 96px;
      width: 3px;
      height: 28px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 38px 0 #3a3a3c, 0 70px 0 #3a3a3c;
      z-index: 10;
    }

    /* Power button (right) */
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 128px;
      width: 3px;
      height: 52px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
      z-index: 10;
    }

    /* The screen area — clips to rounded corners */
    .phone-screen {
      position: absolute;
      inset: 0;
      border-radius: var(--br);
      overflow: hidden;
      background: #000;
    }

    /* The iframe is rendered at full native size, then scaled down */
    .phone-screen iframe {
      display: block;
      width: 393px;
      height: 852px;
      border: none;
      transform-origin: top left;
      transform: scale(var(--s));
      pointer-events: all;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: calc(11px * var(--s));
      left: 50%;
      transform: translateX(-50%);
      width: calc(120px * var(--s));
      height: calc(34px * var(--s));
      background: #000;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: calc(8px * var(--s));
      left: 50%;
      transform: translateX(-50%);
      width: calc(120px * var(--s));
      height: calc(5px * var(--s));
      background: rgba(255,255,255,0.28);
      border-radius: 3px;
      z-index: 20;
      pointer-events: none;
    }

    /* Subtle glass reflection */
    .phone-reflection {
      position: absolute;
      inset: 0;
      border-radius: var(--br);
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 45%);
      pointer-events: none;
      z-index: 30;
    }

    /* ─── Responsive scaling ─── */
    /* Tall screens (≥900px height): slightly bigger phone */
    @media (min-height: 900px) {
      .phone-shell {
        --s: 0.8346;
        --fw: 328px;
        --fh: 711px;
        --br: 52px;
      }
    }

    /* Short screens (<780px height): smaller phone */
    @media (max-height: 780px) {
      .phone-shell {
        --s: 0.6921;
        --fw: 272px;
        --fh: 590px;
        --br: 43px;
      }
    }

    /* Very short screens (<680px height): even smaller */
    @media (max-height: 680px) {
      .phone-shell {
        --s: 0.6107;
        --fw: 240px;
        --fh: 520px;
        --br: 38px;
      }
    }

    /* Hide brand info on narrow screens */
    @media (max-width: 860px) {
      .brand-info { display: none; }
    }

    /* ─── MOBILE VIEW (full screen) ─── */
    .mobile-view {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
    }

    .mobile-view iframe {
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: none;
    }

    /* On mobile: hide desktop, show mobile full-screen */
    @media (max-width: 768px) {
      body { background: #000; }
      #password-gate { background: var(--espresso); align-items: center; justify-content: flex-end; padding-bottom: 20vh; }
      .desktop-view { display: none !important; }
      .mobile-view { display: block !important; }

      .gate-logo { width: 280px; height: 160px; }
      .gate-form { width: 260px; }
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="password-gate">
    <div class="gate-center-group">
      <div class="gate-logo">
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663222833884/CWGyVsBcYSzTVuzr.png" alt="Icon Backstage" />
      </div>
      <div class="gate-form">
        <input
          type="password"
          id="password-input"
          class="gate-input"
          placeholder="Adgangskode"
          autocomplete="current-password"
          autofocus
        />
        <button class="gate-btn" onclick="checkPassword()">Åbn app →</button>
        <div class="gate-error" id="gate-error"></div>
      </div>
    </div>
  </div>

  <!-- MAIN PRESENTATION -->
  <div id="presentation">

    <!-- Desktop: iPhone mockup -->
    <div class="desktop-view">

      <!-- Brand sidebar -->
      <div class="brand-info">
        <div class="brand-logo">
          <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663222833884/CWGyVsBcYSzTVuzr.png" alt="Icon Hair" />
        </div>
        <div class="brand-badge">✦ Preview</div>
        <div class="brand-name">Icon<br /><span>Backstage</span></div>
        <div class="brand-desc">
          Din salon i lommen. Bestil produkter, følg kampagner, administrer medarbejdere og hold styr på salgskonkurrencer — alt samlet ét sted.
        </div>
      </div>

      <!-- iPhone shell -->
      <div class="phone-shell">
        <div class="phone-screen">
          <iframe
            id="app-iframe-desktop"
            src="about:blank"
            title="Icon Backstage App"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
          ></iframe>
        </div>
        <div class="dynamic-island"></div>
        <div class="home-indicator"></div>
        <div class="phone-reflection"></div>
      </div>

    </div>

    <!-- Mobile: full screen -->
    <div class="mobile-view">
      <iframe
        id="app-iframe-mobile"
        src="about:blank"
        title="Icon Backstage App"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
      ></iframe>
    </div>

  </div>

  <script>
    const PASSWORD  = 'Anker';
    const APP_URL   = 'https://8081-ibvefpx9gcoq4l017yim9-738172b1.us1.manus.computer';
    const SESSION_KEY = 'ib_auth_v2';

    // Auto-login if session exists
    if (sessionStorage.getItem(SESSION_KEY) === '1') showApp();

    function checkPassword() {
      const input = document.getElementById('password-input');
      const error = document.getElementById('gate-error');
      if (input.value === PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, '1');
        error.textContent = '';
        showApp();
      } else {
        error.textContent = 'Forkert adgangskode. Prøv igen.';
        input.value = '';
        input.focus();
        input.style.animation = 'none';
        input.offsetHeight;
        input.style.animation = 'shake 0.4s ease';
      }
    }

    function showApp() {
      document.getElementById('password-gate').classList.add('hidden');
      document.getElementById('presentation').classList.add('visible');
      document.getElementById('app-iframe-desktop').src = APP_URL;
      document.getElementById('app-iframe-mobile').src  = APP_URL;
    }

    document.getElementById('password-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>

</body>
</html>
